name: Playwright Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t test-automation-ui-pw .

      - name: Run Playwright tests (Chromium)
        env:
          BASE_URL: https://sauce-demo.myshopify.com/
          BROWSER: chromium
        run: |
          docker run --rm \
            -e BASE_URL=$BASE_URL \
            -e BROWSER=$BROWSER \
            test-automation-ui-pw \
            npx playwright test --project=$BROWSER || true

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report-chromium/